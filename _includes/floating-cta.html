<div class="floating-cta" id="floatingCta">
  {% if page.lang == "fr" %}
    <button class="floating-cta-toggle" id="floatingCtaToggle" aria-label="Ouvrir les actions rapides" aria-expanded="false" aria-controls="floatingCtaMenu">
      <span>+</span>
    </button>

    <div class="floating-cta-menu" id="floatingCtaMenu">
      <a href="{{ site.baseurl }}/fr/services" class="floating-cta-link">Voir les services</a>
      <a href="{{ site.baseurl }}/fr/services/management" class="floating-cta-link">Demander une analyse</a>
      <a href="{{ site.baseurl }}/fr/contact" class="floating-cta-link">Poser une question</a>
    </div>
  {% else %}
    <button class="floating-cta-toggle" id="floatingCtaToggle" aria-label="Open quick actions" aria-expanded="false" aria-controls="floatingCtaMenu">
      <span>+</span>
    </button>

    <div class="floating-cta-menu" id="floatingCtaMenu">
      <a href="{{ site.baseurl }}/en/services" class="floating-cta-link">See all services</a>
      <a href="{{ site.baseurl }}/en/services/management" class="floating-cta-link">Request a review</a>
      <a href="{{ site.baseurl }}/en/contact" class="floating-cta-link">Ask a question</a>
    </div>
  {% endif %}
</div>
