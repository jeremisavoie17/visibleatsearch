<nav class="nav" aria-label="Main navigation">
  <div class="nav-inner">
    {% if page.lang == "fr" %}
      <a class="brand" href="{{ site.baseurl }}/fr/">Visible at Search</a>
    {% else %}
      <a class="brand" href="{{ site.baseurl }}/en/">Visible at Search</a>
    {% endif %}

    <button class="nav-toggle" type="button" aria-label="Menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="links">
      {% if page.lang == "fr" %}
        <a{% if page.nav == "home" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/fr/">Accueil</a>
        <a{% if page.nav == "services" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/fr/services">Services</a>
        <a{% if page.nav == "pricing" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/fr/tarifs">Tarifs</a>
        <a{% if page.nav == "faq" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/fr/faq">FAQ</a>
        <a{% if page.nav == "guides" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/fr/guides">Guides</a>
        <a{% if page.nav == "contact" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/fr/contact">Contact</a>
      {% else %}
        <a{% if page.nav == "home" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/en/">Home</a>
        <a{% if page.nav == "services" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/en/services">Services</a>
        <a{% if page.nav == "pricing" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/en/pricing">Pricing</a>
        <a{% if page.nav == "faq" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/en/faq">FAQ</a>
        <a{% if page.nav == "guides" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/en/guides">Learn</a>
        <a{% if page.nav == "contact" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/en/contact">Contact</a>
      {% endif %}
    </div>

    <div class="lang" aria-label="Language switcher">
      {% if page.lang == "fr" %}
        <a href="{{ site.baseurl }}{{ page.alt_lang_url }}">EN</a>
        <span class="sep">|</span>
        <a href="{{ site.baseurl }}{{ page.permalink | replace:'index.html','' }}" aria-current="page">FR</a>
      {% else %}
        <a href="{{ site.baseurl }}{{ page.permalink | replace:'index.html','' }}" aria-current="page">EN</a>
        <span class="sep">|</span>
        <a href="{{ site.baseurl }}{{ page.alt_lang_url }}">FR</a>
      {% endif %}
    </div>
  </div>
</nav>
